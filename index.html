<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Action Bar</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="policy-section">
                <span class="policy-label">Policy No:</span>
                <span class="policy-no">123456789012</span>
            </div>
            <div class="user-section">
                <div class="user-profile">
                    <img src="/assets/images.png" alt="User">
                </div>
            </div>
        </div>
    </nav>

    <main class="content">
        <div class="action-wrapper">
            <div class="action-bar">
                <div class="dropdown-container">
                    <button class="btn-show-more dropdown-trigger">
                        medical claims<i class='bx bx-chevron-down'></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><i class='bx bx-file'></i> Reports</li>
                        <li><i class='bx bx-history'></i> History</li>
                        <li><i class='bx bx-cog'></i> Settings</li>
                    </ul>
                </div>
                <div class="divider"></div>
                <div class="upload-container">
                    <input type="file" class="file-input-field" hidden>
                    <button class="btn-upload">
                        <i class='bx bx-cloud-upload'></i> Upload
                    </button>
                </div>
            </div>
        </div>

        <div class="action-wrapper">
            <div class="action-bar">
                <div class="dropdown-container">
                    <button class="btn-show-more dropdown-trigger">
                        vehicle claims <i class='bx bx-chevron-down'></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><i class='bx bx-file'></i> Reports</li>
                        <li><i class='bx bx-history'></i> History</li>
                        <li><i class='bx bx-cog'></i> Settings</li>
                    </ul>
                </div>
                <div class="divider"></div>
                <div class="upload-container">
                    <input type="file" class="file-input-field" hidden>
                    <button class="btn-upload">
                        <i class='bx bx-cloud-upload'></i> Upload
                    </button>
                </div>
            </div>
        </div>

         <div class="action-wrapper">
            <div class="action-bar">
                <div class="dropdown-container">
                    <button class="btn-show-more dropdown-trigger">
                        travel claims <i class='bx bx-chevron-down'></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><i class='bx bx-file'></i> Reports</li>
                        <li><i class='bx bx-history'></i> History</li>
                        <li><i class='bx bx-cog'></i> Settings</li>
                    </ul>
                </div>
                <div class="divider"></div>
                <div class="upload-container">
                    <input type="file" class="file-input-field" hidden>
                    <button class="btn-upload">
                        <i class='bx bx-cloud-upload'></i> Upload
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
