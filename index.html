<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern-Web-Action-Bar</title>
    <link rel="stylesheet" href="/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <nav class="navbar">
    <div class="policy-section">
        <span class="policy-no">POL-123456789012</span> </div>

    <div class="user-section">
        <div class="user-profile">
            <img src="https://via.placeholder.com/40" alt="User">
        </div>
    </div>
</nav>

    <div class="wrapper">
        <div class="action-bar">
            
            <div class="dropdown-wrapper">
                <button class="btn-show-more" id="dropdownBtn">
                    Show More <i class='bx bx-chevron-down'></i>
                </button>
                
                <ul class="dropdown-list" id="dropdownList">
                    <li><i class='bx bx-file'></i> Reports</li>
                    <li><i class='bx bx-history'></i> History</li>
                    <li><i class='bx bx-cog'></i> Settings</li>
                </ul>
            </div>

            <div class="divider"></div>

            <div class="upload-wrapper">
                <input type="file" id="fileInput" hidden>
                <label for="fileInput" class="btn-upload">
                    <i class='bx bx-cloud-upload'></i> Upload
                </label>
            </div>

        </div>

                    <i class='bx bx-cloud-upload'></i> Upload
                </label>
            </div>

        </div>
    </div>
